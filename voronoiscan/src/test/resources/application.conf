akka {

  license-key = "3CecWl2XFuq4uQpVSdkxa28LLmBrKMQTF8LON2lAC4jE8bK8FEnuUxX48IfuYbiC3948w8jEapyD568MIVPVBsEs9aMVp9IlXegBdoIdi3bAJoLjUAsQCQb7BGXTyv7aKFcv34mp8mCDX277FdxIVUB9MH1wMDsyLKD2"

  actor {
    provider = "cluster"

    serializers {
      java = "akka.serialization.JavaSerializer"
      jackson-json = "akka.serialization.jackson.JacksonJsonSerializer"
      jackson-cbor = "akka.serialization.jackson.JacksonCborSerializer"
      # Use a distinct alias to avoid shadowing Akka's built-in 'proto' serializer
      scalapb = "serialization.ProtobufSerializer"
    }

    serialization-bindings {
      # Protobuf serialization for custom messages
      "serialization.ProtobufSerializable" = scalapb
      # Jackson CBOR for other serializable messages
      "serialization.CborSerializable" = jackson-cbor
    }

    # Use this setting to test serialization of messages in a local scenario.
    # serialize-messages = on

    enable-additional-serialization-bindings = on
    allow-java-serialization = off

    guardian-supervisor-strategy = "akka.actor.StoppingSupervisorStrategy"
  }

  # Root-level dispatcher definitions referenced by name
  worker-pool-dispatcher {
    type = Dispatcher
    executor = "fork-join-executor"
    fork-join-executor {
      # 32-core machine: keep threads == physical cores to avoid oversubscription with vector API
      parallelism-min = 32
      parallelism-factor = 1.0   # 1.0 * available processors => 32
      parallelism-max = 32       # cap at 32 to stay bounded
    }
    # Higher throughput reduces scheduling overhead for manager actors and batch workers
    throughput = 16
  }

  # Optional dedicated dispatcher for ultra short-lived point workers (can experiment)
  connectivity-dispatcher {
    type = Dispatcher
    executor = "fork-join-executor"
    fork-join-executor {
      parallelism-min = 32
      parallelism-factor = 1.0
      parallelism-max = 32
    }
    throughput = 8
  }

  master-pinned-dispatcher {
    type = PinnedDispatcher
    executor = "thread-pool-executor"
    thread-pool-executor {
      fixed-pool-size = 1
      # Prohibit core timeout to ensure that the master actor and its children is always available
      allow-core-timeout = off
    }
    throughput = 1
  }

  file-io-dispatcher {
    type = Dispatcher
    executor = "thread-pool-executor"
    thread-pool-executor {
      # Ensure that the file IO dispatcher has a fixed number of threads being the number of cores
      core-pool-size-factor = 1.0
      max-pool-size-factor = 1.0
    }
    throughput = 1
  }

  remote {
    # https://doc.akka.io/docs/akka/2.5/remoting-artery.html#dedicated-subchannel-for-large-messages
    artery {
      enabled = on
      transport = tcp # Think about using aeron-udp. https://doc.akka.io/libraries/akka-core/current/remoting-artery.html
      canonical.hostname = "localhost"
      canonical.port = 2551
      maximum-frame-size = 1 MiB
      large-message-destinations = [
        "/user/worker/Clusterer-*"
      ]
      advanced {
        maximum-large-frame-size = 8 MiB
        large-buffer-pool-size = 32
        outbound-large-message-queue-size = 256
      }
    }

    log-received-messages = off
    log-sent-messages = off
  }

  cluster {
    min-nr-of-members = 1
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"

    gossip-interval = 1s
    gossip-time-to-live = 2s
    leader-actions-interval = 1s

    failure-detector {
      implementation-class = "akka.remote.PhiAccrualFailureDetector"
      heartbeat-interval = 5s
      threshold = 12.0
      max-sample-size = 1000
      min-std-deviation = 100ms
      acceptable-heartbeat-pause = 10s
      monitored-by-nr-of-members = 5
      expected-response-after = 2s
    }

    # Sigar native library extract location during tests.
    # Note: use per-jvm-instance folder when running multiple jvm on one host.
#    metrics.native-library-extract-folder=${user.dir}/target/native
  }

  loggers = ["akka.event.slf4j.Slf4jLogger"]
  loglevel = "INFO"
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
  logger-startup-timeout = "60s"
  log-dead-letters = "off"
  # Enable metrics extension in akka-cluster-metrics.
  extensions = ["akka.cluster.metrics.ClusterMetricsExtension"]

  coordinated-shutdown {
    run-by-actor-system-terminate = on
    terminate-actor-system = on
    exit-jvm = off
    phases {
      actor-system-terminate {
        timeout = 2s
        recover = on
      }
    }
  }
}

voronoiscan.serialization {
  zstd.compression-threshold = 512
}
